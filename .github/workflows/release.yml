name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+*'

jobs:
  release:
    name: Build and publish release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set release variables
        id: vars
        run: |
          ver=${GITHUB_REF#refs/tags/}
          echo "ver=${ver}" >> $GITHUB_OUTPUT
          if echo $ver | grep -qE '^v[0-9]+\.[0-9]+(\.[0-9]+)?(-alpha|-beta|-rc)[0-9]*$'; then
            echo "pre=true"  >> $GITHUB_OUTPUT
          else
            echo "pre=false" >> $GITHUB_OUTPUT
          fi
          if echo $ver | grep -qE '^v[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "latest=true"  >> $GITHUB_OUTPUT
          else
            echo "latest=false" >> $GITHUB_OUTPUT
          fi
      - name: Build release tarball
        run: |
          ver=${{ steps.vars.outputs.ver }}
          name=kg-${ver}
          mkdir -p artifacts
          git archive --format=tar.gz --prefix=${name}/ HEAD -o artifacts/${name}.tar.gz
      - name: Build .deb package
        run: |
          sudo apt-get install -y debhelper build-essential
          make deb
          mv ../kg_*.deb artifacts/
      - name: Extract release notes
        run: sh utils/genrel.sh doc/ChangeLog.md > artifacts/release.md
      - uses: ncipollo/release-action@v1
        with:
          name: kg ${{ steps.vars.outputs.ver }}
          bodyFile: artifacts/release.md
          prerelease: ${{ steps.vars.outputs.pre }}
          makeLatest: ${{ steps.vars.outputs.latest }}
          artifacts: "artifacts/*.tar.gz,artifacts/*.deb"
